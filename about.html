<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технологии • Nexus Dynamics</title>
    <link rel="stylesheet" href="about.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">⚡ NEXUS <span>DYNAMICS</span></div>
    <ul class="nav-links">
        <li><a href="index.html">Главная</a></li>
        <li><a href="about.html" class="active">Технологии</a></li>
        <li><a href="contact.html">Контакты</a></li>
    </ul>
</nav>

<section class="tech-hero">
    <h1 class="flicker-title">Инновации, меняющие мир</h1>

    <!-- SVG Анимация волны -->
    <div class="tech-svg-banner">
        <svg width="300" height="80" viewBox="0 0 400 100">
            <path d="M0,50 Q50,20 100,50 T200,50 T300,50 T400,50" fill="none" stroke="#00d4ff" stroke-width="2">
                <animate attributeName="d" values="M0,50 Q50,20 100,50 T200,50 T300,50 T400,50;M0,50 Q50,80 100,50 T200,50 T300,50 T400,50;M0,50 Q50,20 100,50 T200,50 T300,50 T400,50" dur="3s" repeatCount="indefinite"/>
            </path>
            <circle cx="50" cy="50" r="4" fill="#00d4ff">
                <animate attributeName="cx" values="0;400" dur="4s" repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>

    <div class="tech-showcase">
        <div class="tech-item" id="hoverReveal">
            <span class="tech-icon">🔬</span> Квантовые сенсоры
            <div class="tech-item-svg">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="8" fill="none" stroke="cyan" stroke-width="1.5">
                        <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
                    </circle>
                </svg>
            </div>
        </div>
        <div class="tech-item" id="hoverReveal2">
            <span class="tech-icon">🌀</span> Плазменные двигатели
            <div class="tech-item-svg">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <polygon points="20,5 30,35 20,28 10,35" fill="none" stroke="cyan" stroke-width="1.5">
                        <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="3s" repeatCount="indefinite"/>
                    </polygon>
                </svg>
            </div>
        </div>
        <div class="tech-item">
            <span class="tech-icon">💎</span> Алмазные полупроводники
            <div class="tech-item-svg">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <rect x="15" y="15" width="10" height="10" fill="none" stroke="cyan" stroke-width="1.5">
                        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
                    </rect>
                </svg>
            </div>
        </div>
    </div>

    <div id="hiddenImageZone" style="margin-top: 20px; min-height: 120px;"></div>
</section>

<section class="lab-map">
    <h2>🌍 Наши R&D центры</h2>
    <div class="map-hover-area" id="secretMapTrigger">
        🗺️ Наведи на глобус → секретный объект
    </div>
    <div id="easterMapImage" style="display:none; margin-top: 20px; display: flex; justify-content: center;"></div>
</section>

<script src="about.js"></script>
</body>
</html>
